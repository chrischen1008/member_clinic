<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動態產生會員療程表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .card-header-custom { background-color: #fff3cd; color: #856404; font-weight: bold; }
        .table input, .table select { border: 1px solid #ced4da; padding: 4px 8px; border-radius: 4px; width: 100%; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="mb-4 text-center">動態產生會籍權益表格</h2>
    
    <div class="card mb-4 shadow-sm">
        <div class="card-body row g-3 align-items-center">
            <div class="col-md-5 d-flex align-items-center">
                <label class="form-label me-2 mb-0 text-nowrap">會員贈送：</label>
                <input type="number" id="membership_count" class="form-control" value="6" min="0">
                <span class="ms-2 text-nowrap">堂</span>
            </div>
            <div class="col-md-5 d-flex align-items-center">
                <label class="form-label me-2 mb-0 text-nowrap">每月贈送：</label>
                <input type="number" id="monthly_count" class="form-control" value="2" min="0">
                <span class="ms-2 text-nowrap">堂</span>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary w-100" onclick="generateTables()">產生表格</button>
            </div>
        </div>
    </div>

    <form action="/save_batch" method="POST">
        <input type="hidden" name="member_name" value="張紘睿">

        <div class="card mb-4 shadow-sm" id="membership_card" style="display: none;">
            <div class="card-header card-header-custom">
                會員贈送 三選一療程 (<span id="txt_membership_count">0</span>堂)
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0 text-center align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 20%;">使用區間</th>
                            <th style="width: 15%;">使用時間</th>
                            <th style="width: 15%;">使用者姓名</th>
                            <th style="width: 20%;">使用療程</th>
                            <th style="width: 10%;">剩餘堂數</th>
                            <th style="width: 20%;">備註</th>
                        </tr>
                    </thead>
                    <tbody id="membership_tbody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-4 shadow-sm" id="monthly_card" style="display: none;">
            <div class="card-header card-header-custom">
                每月贈送 三選一療程 (<span id="txt_monthly_count">0</span>堂)
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0 text-center align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 12%;">開始日期</th>
                            <th style="width: 12%;">截止日期</th>
                            <th style="width: 15%;">使用時間</th>
                            <th style="width: 15%;">使用者姓名</th>
                            <th style="width: 18%;">使用療程</th>
                            <th style="width: 10%;">本月剩餘</th>
                            <th style="width: 18%;">備註</th>
                        </tr>
                    </thead>
                    <tbody id="monthly_tbody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="text-end mb-5" id="submit_area" style="display: none;">
            <button type="submit" class="btn btn-success btn-lg px-5">批次儲存至資料庫</button>
        </div>
    </form>
</div>

<script>
function generateTables() {
    // 取得輸入的數量
    const membershipCount = parseInt(document.getElementById('membership_count').value) || 0;
    const monthlyCount = parseInt(document.getElementById('monthly_count').value) || 0;

    // 更新標題文字
    document.getElementById('txt_membership_count').innerText = membershipCount;
    document.getElementById('txt_monthly_count').innerText = monthlyCount;

    // --- 1. 產生「會員贈送」表格列 ---
    const membershipTbody = document.getElementById('membership_tbody');
    membershipTbody.innerHTML = ''; // 清空舊資料
    if (membershipCount > 0) {
        document.getElementById('membership_card').style.display = 'block';
        for (let i = 0; i < membershipCount; i++) {
            // 利用剩餘堂數倒數計時（如 6, 5, 4...）
            let displayRemaining = membershipCount - i; 
            
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" name="m_period[]" value="2026/04/23-2027/04/30"></td>
                <td><input type="datetime-local" name="m_usage_time[]"></td>
                <td><input type="text" name="m_user_name[]" value="張紘睿"></td>
                <td>
                    <select name="m_treatment_type[]">
                        <option value="">-- 請選擇 --</option>
                        <option value="靜脈雷射">靜脈雷射</option>
                        <option value="氫氧">氫氧</option>
                        <option value="保肝點滴">保肝點滴</option>
                    </select>
                </td>
                <td><input type="number" name="m_remaining[]" value="${displayRemaining}"></td>
                <td><input type="text" name="m_notes[]" placeholder="選填"></td>
            `;
            membershipTbody.appendChild(tr);
        }
    } else {
        document.getElementById('membership_card').style.display = 'none';
    }

    // --- 2. 產生「每月贈送」表格列 ---
    const monthlyTbody = document.getElementById('monthly_tbody');
    monthlyTbody.innerHTML = ''; // 清空舊資料
    if (monthlyCount > 0) {
        document.getElementById('monthly_card').style.display = 'block';
        for (let i = 0; i < monthlyCount; i++) {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="date" name="mo_start[]"></td>
                <td><input type="date" name="mo_end[]"></td>
                <td><input type="datetime-local" name="mo_usage_time[]"></td>
                <td><input type="text" name="mo_user_name[]" value="張紘睿"></td>
                <td>
                    <select name="mo_treatment_type[]">
                        <option value="">-- 請選擇 --</option>
                        <option value="靜脈雷射">靜脈雷射</option>
                        <option value="氫氧">氫氧</option>
                        <option value="保肝點滴">保肝點滴</option>
                    </select>
                </td>
                <td><input type="number" name="mo_remaining[]" value="1"></td>
                <td><input type="text" name="mo_notes[]" placeholder="選填"></td>
            `;
            monthlyTbody.appendChild(tr);
        }
    } else {
        document.getElementById('monthly_card').style.display = 'none';
    }

    // 顯示儲存按鈕
    if (membershipCount > 0 || monthlyCount > 0) {
        document.getElementById('submit_area').style.display = 'block';
    } else {
        document.getElementById('submit_area').style.display = 'none';
    }
}

// 網頁載入時自動執行一次預設值
window.onload = generateTables;
</script>
</body>
</html>
