<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>{% block title %}會員管理系統{% endblock %}</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<!-- ⭐ 1. 引入 Bootstrap Datepicker CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css">

<style>
body { margin: 0; }

/* 側邊欄基礎樣式 */
.sidebar {
    width: 0; 
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    background: #1f2937;
    padding-top: 60px; 
    transition: all 0.3s ease; 
    z-index: 1000;
    overflow-x: hidden; 
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    padding: 12px 20px;
    text-decoration: none;
    white-space: nowrap; 
}

.sidebar a:hover {
    background: #374151;
    color: #fff;
}

.sidebar a.active {
    background: #2563eb;
    color: white;
}

.content {
    margin-left: 0; 
    padding: 20px;
    transition: all 0.3s ease; 
    padding-top: 60px; 
}

.top-nav {
    height: 60px;
    background-color: #f8f9fa;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1001; 
    border-bottom: 1px solid #dee2e6;
}

.toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;          
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 24px;         
    height: 18px;        
    z-index: 1002;
    position: relative;  
}

.toggle-btn span {
    display: block;
    height: 3px;
    width: 100%;
    background-color: #333;
    border-radius: 2px;
    transition: all 0.3s ease;
    transform-origin: center; 
    position: absolute;       
}
.toggle-btn span:nth-child(1) { top: 0; }
.toggle-btn span:nth-child(2) { top: 7px; }
.toggle-btn span:nth-child(3) { top: 14px; }

body.sidebar-open .sidebar { width: 240px; }
body.sidebar-open .content { margin-left: 240px; }

.toggle-btn.active span:nth-child(1) { top: 7px; transform: rotate(45deg); }
.toggle-btn.active span:nth-child(2) { width: 0%; opacity: 0; }
.toggle-btn.active span:nth-child(3) { top: 7px; transform: rotate(-45deg); }

/* ⭐ 2. 解決 Bootstrap Datepicker 被 Modal 蓋住的問題 */
.datepicker {
    z-index: 9999 !important;
}
/* ========================================================= */
/* ⭐ Bootstrap Datepicker 排版修復 (終極版)                  */
/* ========================================================= */
.datepicker.datepicker-dropdown {
    min-width: 280px !important; /* 確保外框夠寬 */
    padding: 10px !important;
}

/* 強制修復月份、年份被擠壓的問題 */
.datepicker .datepicker-months td span, 
.datepicker .datepicker-years td span,
.datepicker .datepicker-decades td span {
    display: inline-block !important; /* 關鍵！沒有這個，寬高設定會失效 */
    width: 22% !important;            /* 每排 4 個，保留一點彈性空間 */
    height: 42px !important;          /* 加高按鈕 */
    line-height: 42px !important;     /* 讓文字垂直置中 */
    margin: 1% !important;            /* 強制撐出按鈕間距 */
    white-space: nowrap !important;   /* 絕對不准換行 */
    border-radius: 5px !important;    /* 圓角 */
    font-size: 15px !important;       /* 確保字體大小適中 */
}
</style>

</head>

<body class="sidebar-open">

<div class="top-nav">
    <button class="toggle-btn active" id="sidebarToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <h5 class="ms-3 mb-0">會員管理系統</h5>
</div>

<div class="sidebar" id="mySidebar">
    <a href="/introduction_img" class="{% if active == 'introduction_img' %}active{% endif %}">年度健康管理會員</a>
    <a href="/members" class="{% if active == 'members' %}active{% endif %}">會員基本資料</a>
    <a href="/member_rights" class="{% if active == 'member_rights' %}active{% endif %}">會員內容</a>
    <a href="/course_list" class="{% if active == 'course_list' %}active{% endif %}">療程清單</a>
    <a href="/orders" class="{% if active == 'orders' %}active{% endif %}">購買紀錄</a>
    <a href="/reports" class="{% if active == 'reports' %}active{% endif %}">報表</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- 核心基礎套件 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<!-- ⭐ 3. 引入 Bootstrap Datepicker JS 與 繁體中文語系 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.zh-TW.min.js"></script>

<script>
$(document).ready(function() {
    // 側邊欄切換
    $('#sidebarToggle').on('click', function() {
        $(this).toggleClass('active');
        $('body').toggleClass('sidebar-open');
    });

    // ⭐ 4. 全域自動初始化所有日期輸入框
    $('.js-datepicker').datepicker({
        format: 'yyyy-mm-dd',
        language: 'zh-TW',
        autoclose: true,
        todayHighlight: true,
        orientation: "bottom auto" // 讓日曆自動往下長，避免超出螢幕頂端
    }).on('changeDate', function() {
        // 當選擇日期後，主動觸發 input 事件，讓 Bootstrap 的 Floating Label 順暢縮小浮起
        $(this).trigger('input');
    });
});
</script>

{% block scripts %}{% endblock %}

</body>
</html>
