<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>{% block title %}會員管理系統{% endblock %}</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- DataTables CSS (新增) -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<style>
body { margin: 0; }

.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #1f2937;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #374151;
    color: #fff;
}

/* ⭐ active 高亮 */
.sidebar a.active {
    background: #2563eb;
    color: white;
}

.content {
    margin-left: 240px;
    padding: 20px;
}

.title {
    color: white;
    padding: 0 20px;
    margin-bottom: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="sidebar">
    <div class="title">會員管理系統</div>

    <a href="/members" class="{% if active == 'members' %}active{% endif %}">
        會員基本資料
    </a>
    <a href="/member_rights" class="{% if active == 'course_list' %}active{% endif %}">
        會員內容
    </a>
    <a href="/course_list" class="{% if active == 'course_list' %}active{% endif %}">
        療程清單
    </a>
    
    <a href="/orders" class="{% if active == 'orders' %}active{% endif %}">
        購買紀錄
    </a>

    <a href="/reports" class="{% if active == 'reports' %}active{% endif %}">
        報表
    </a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- ================= 載入 JS 函式庫 (注意順序不可調換) ================= -->
<!-- 1. jQuery 必須在最前面 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- 2. Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 3. DataTables JS -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<!-- 4. 給子網頁放 jQuery 程式碼的專用區塊 -->
{% block scripts %}{% endblock %}

</body>
</html>
