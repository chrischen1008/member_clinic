<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>{% block title %}會員管理系統{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body { margin: 0; }

.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #1f2937;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #374151;
    color: #fff;
}

/* ⭐ active 高亮 */
.sidebar a.active {
    background: #2563eb;
    color: white;
}

.content {
    margin-left: 240px;
    padding: 20px;
}

.title {
    color: white;
    padding: 0 20px;
    margin-bottom: 20px;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="sidebar">

    <div class="title">會員管理系統</div>

    <a href="/members"
       class="{% if active == 'members' %}active{% endif %}">
       會員基本資料
    </a>

    <a href="/course_list"
       class="{% if active == 'course_list' %}active{% endif %}">
       療程清單
    </a>
    
    <a href="/orders"
       class="{% if active == 'orders' %}active{% endif %}">
       購買紀錄
    </a>


    <a href="/reports"
       class="{% if active == 'reports' %}active{% endif %}">
       報表
    </a>

</div>

<div class="content">

    {% block content %}{% endblock %}

</div>

</body>
</html>
