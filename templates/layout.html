<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>{% block title %}會員管理系統{% endblock %}</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<!-- ⭐ 1. 引入 Bootstrap Datepicker CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    overflow-x: hidden;
}

/* =========================
   Top Nav
========================= */

.top-nav {
    height: 60px;
    background-color: #f8f9fa;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid #dee2e6;

    position: fixed;
    top: 0;
    left: 0;
    right: 0;

    z-index: 1001;
}

/* =========================
   主版型
========================= */

.main-layout {
    display: flex;
    margin-top: 60px;
    min-height: calc(100vh - 60px);
}

/* =========================
   Sidebar
========================= */

.sidebar {
    /* 1. 改為由內容決定寬度，並設定最小與最大寬度限制 */
    width: fit-content;
    min-width: 200px;  /* 基礎寬度，字少時不至於縮太小 */
    max-width: 300px;  /* 限制最大寬度，避免字太多撐得太誇張 */
    
    background: #1f2937;
    transition: all 0.3s ease;
    overflow-x: hidden;
    flex-shrink: 0;
}

/* 當點擊漢堡按鈕折疊時，寬度歸零 */
.sidebar.collapsed {
    width: 0;
    min-width: 0; /* 記得把 min-width 也歸零，否則會折疊不起來 */
    padding: 0;       /* 確保沒有留白 */
    border: none;     /* 移除可能的邊框 */
    overflow: hidden; /* 徹底隱藏內部文字，防止撐開版面 */
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    padding: 12px 24px; /* 微調左右 padding，讓文字與邊緣有呼吸空間 */
    text-decoration: none;
    
    /* 2. 關鍵：保持文字不換行，才能正確把寬度撐開 */
    white-space: nowrap; 
}

.sidebar a.active {
    background: #2563eb; /* 藍色背景 */
    color: white;
    font-weight: bold;
    border-left: 4px solid #60a5fa; /* 左側亮藍色邊條，讓選取狀態更醒目 */
    padding-left: 16px; /* 稍微縮排以平衡邊條寬度 */
}

/* =========================
   Content
========================= */

.content {
    flex: 1;
    min-width: 0;
    padding: 20px;
    overflow-x: auto;

    /* 💡 新增這行：讓內容區塊變寬時有滑順的動畫，對應 sidebar 的 0.3s */
    transition: all 0.3s ease;
}

/* =========================
   漢堡按鈕
========================= */

.toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    width: 24px;
    height: 18px;

    position: relative;
}

.toggle-btn span {
    display: block;
    height: 3px;
    width: 100%;
    background-color: #333;
    border-radius: 2px;

    transition: all 0.3s ease;
    transform-origin: center;
    position: absolute;
}

.toggle-btn span:nth-child(1) {
    top: 0;
}

.toggle-btn span:nth-child(2) {
    top: 7px;
}

.toggle-btn span:nth-child(3) {
    top: 14px;
}

.toggle-btn.active span:nth-child(1) {
    top: 7px;
    transform: rotate(45deg);
}

.toggle-btn.active span:nth-child(2) {
    opacity: 0;
}

.toggle-btn.active span:nth-child(3) {
    top: 7px;
    transform: rotate(-45deg);
}

/* =========================
   Datepicker
========================= */

.datepicker {
    z-index: 9999 !important;
}

.datepicker.datepicker-dropdown {
    min-width: 280px !important;
    padding: 10px !important;
}

.datepicker .datepicker-months td span,
.datepicker .datepicker-years td span,
.datepicker .datepicker-decades td span {
    display: inline-block !important;
    width: 22% !important;
    height: 42px !important;
    line-height: 42px !important;
    margin: 1% !important;
    white-space: nowrap !important;
    border-radius: 5px !important;
    font-size: 15px !important;
}
</style>

</head>

<body>

<div class="top-nav">
    <button class="toggle-btn active" id="sidebarToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <h5 class="ms-3 mb-0">會員管理系統</h5>
</div>

<div class="main-layout">

    <div class="sidebar" id="mySidebar">
        <a href="/introduction_img" class="{% if active == 'introduction_img' %}active{% endif %}">年度健康管理會員</a>
        <a href="/members" class="{% if active == 'members' %}active{% endif %}">會員基本資料</a>
        <a href="/member_rights" class="{% if active == 'member_rights' %}active{% endif %}">會員內容</a>
        <a href="/course_list" class="{% if active == 'course_list' %}active{% endif %}">療程清單</a>
        <a href="/orders" class="{% if active == 'orders' %}active{% endif %}">購買紀錄</a>
        <a href="/reports" class="{% if active == 'reports' %}active{% endif %}">報表</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- 核心基礎套件 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<!-- ⭐ 3. 引入 Bootstrap Datepicker JS 與 繁體中文語系 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.zh-TW.min.js"></script>

<script>
$(document).ready(function() {
    // 1. 側邊欄切換（你原本的程式碼）
    $('#sidebarToggle').on('click', function() {
        $(this).toggleClass('active');
        $('#mySidebar').toggleClass('collapsed');

        // 💡 關鍵新增：等待側邊欄的 CSS 動畫結束 (300 毫秒) 後，強制重新計算寬度
        setTimeout(function() {
            // 觸發視窗的 resize 事件，讓常規的 RWD 元素自動撐開
            $(window).trigger('resize');

            // 如果該頁面有使用 DataTables 表格，強制它重新校正欄位寬度
            if ($.fn.DataTable) {
                $.fn.dataTable.tables({ visible: true, api: true }).columns.adjust();
            }
        }, 300); // 這裡的 300 對應 CSS 裡的 0.3s
    });

    // 2. 自動偵測網址並高亮側邊欄選單
    var currentPath = window.location.pathname; // 取得目前的網址路徑，例如 "/members"
    
    $('#mySidebar a').each(function() {
        var menuHref = $(this).attr('href'); // 取得選單的 href 屬性
        
        // 檢查目前的網址是否包含或等於該選單的 href
        if (currentPath === menuHref) {
            $(this).addClass('active');
        } else {
            $(this).removeClass('active'); // 確保其他沒有匹配到的不會亮起
        }
    });

    // 3. Datepicker 初始化（你原本的程式碼）
    $('.js-datepicker').datepicker({
        format: 'yyyy/mm/dd',
        language: 'zh-TW',
        autoclose: true,
        todayHighlight: true,
        orientation: "bottom auto"
    }).on('changeDate', function() {
        $(this).trigger('input');
    });
});
</script>

{% block scripts %}{% endblock %}

</body>
</html>
