<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>會員管理</title>

<!-- DataTables -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
td.editable:hover {
    background: #f0f8ff;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>會員管理系統</h2>

<table id="membersTable" class="display">
    <thead>
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>Email</th>
            <th>電話</th>
            <th>建立時間</th>
        </tr>
    </thead>

    <tbody>
        {% for m in members %}
        <tr data-id="{{ m.id }}">
            <td>{{ m.id }}</td>

            <td class="editable" data-field="name">{{ m.name }}</td>
            <td class="editable" data-field="email">{{ m.email }}</td>
            <td class="editable" data-field="phone">{{ m.phone }}</td>
            <td>{{ m.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
$(document).ready(function () {
    $('#membersTable').DataTable({
        pageLength: 5,
        language: {
            search: "搜尋：",
            lengthMenu: "顯示 _MENU_ 筆",
            info: "第 _START_ 到 _END_ 筆 / 共 _TOTAL_ 筆",
            paginate: {
                first: "第一頁",
                last: "最後頁",
                next: "下一頁",
                previous: "上一頁"
            }
        }
    });
});
</script>

<script>
// ===== inline edit =====
document.querySelectorAll(".editable").forEach(cell => {

    cell.addEventListener("click", function () {

        if (this.querySelector("input")) return;

        let oldValue = this.innerText;
        let field = this.dataset.field;
        let row = this.parentElement;
        let id = row.dataset.id;

        let input = document.createElement("input");
        input.value = oldValue;

        this.innerText = "";
        this.appendChild(input);
        input.focus();

        function save() {
            let newValue = input.value;

            fetch(`/members/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    [field]: newValue
                })
            })
            .then(res => res.json())
            .then(() => {
                cell.innerText = newValue;
            })
            .catch(() => {
                cell.innerText = oldValue;
                alert("更新失敗");
            });
        }

        input.addEventListener("blur", save);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") save();
        });

    });

});
</script>

</body>
</html>
